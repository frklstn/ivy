name: APK



on:
  push:
    branches:
      - main
  pull_request:


jobs:
  assemble_demo_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GIT
        uses: actions/checkout@v6

      - name: Restore google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android-app/google-services.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'adopt'
          java-version: '18'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Bot - Start Build Notification
        id: bot_start
        env:
          TELEGRAM_TOKEN: ${{ secrets.BOTFATHER_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "-1003913443231"
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)
          MSG_ID=$(python scripts/telegram_notifier.py start "$COMMIT_MSG" "$GITHUB_REPOSITORY" "$GITHUB_SHA")
          echo "msg_id=$MSG_ID" >> $GITHUB_OUTPUT

      - name: Build Demo APK
        id: build_step
        env:
          TELEGRAM_TOKEN: ${{ secrets.BOTFATHER_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "-1003913443231"
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)
          chmod +x scripts/*.sh
          
          # Buat file lock untuk menandakan build mulai
          touch build_running.lock
          
          # Jalankan monitor di background
          ./scripts/live_monitor.sh "${{ steps.bot_start.outputs.msg_id }}" "$COMMIT_MSG" "$GITHUB_SHA" &
          MONITOR_PID=$!
          
          # Jalankan build
          ./gradlew assembleDemo 2>&1 | tee build.log
          
          # Hapus file lock untuk menghentikan monitor
          rm build_running.lock
          wait $MONITOR_PID || true

      - name: Bot - Success Notification
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.BOTFATHER_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "-1003913443231"
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)
          python scripts/telegram_notifier.py success "${{ steps.bot_start.outputs.msg_id }}" "android-app/build/outputs/apk/demo/app-demo.apk" "$COMMIT_MSG" "$GITHUB_SHA"

      - name: Bot - Failure Notification
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.BOTFATHER_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "-1003913443231"
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)
          # Mengambil 30 baris terakhir dari build.log untuk detail error yang lebih lengkap
          ERROR_LOG=$(tail -n 30 build.log | sed 's/<[^>]*>//g') 
          python scripts/telegram_notifier.py fail "${{ steps.bot_start.outputs.msg_id }}" "$COMMIT_MSG" "$GITHUB_SHA" "$ERROR_LOG"

      - name: Upload APK to Github Actions
        uses: actions/upload-artifact@v7
        with:
          name: Ivy-Wallet-Demo.apk
          path: android-app/build/outputs/apk/demo/app-demo.apk

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android-app/build/outputs/apk/demo/app-demo.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
